<!-- Search page specific styles -->
<style>
.search-page {
    min-height: 100vh;
    padding: 100px 0 6rem;
    background: var(--c-white);
}

.search-hero {
    text-align: center;
    margin-bottom: 3rem;
}

.search-hero h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--c-dark);
    margin-bottom: 0.75rem;
}

.search-hero p {
    color: var(--c-muted);
    font-size: 1.05rem;
}

#search-box {
    max-width: 720px;
    margin: 0 auto;
}

.search-input {
    width: 100%;
    background: var(--c-off-white);
    color: var(--c-body);
    border: 1px solid var(--c-border);
    border-radius: var(--radius-sm);
    font-size: 1.1rem;
    padding: 1rem 1.5rem;
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.2s;
}

.search-input:focus {
    border-color: var(--c-primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
}

.search-input::placeholder {
    color: var(--c-muted);
}

.search-results {
    margin-top: 2rem;
}

.search-result {
    display: block;
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--c-border);
    color: inherit;
    text-decoration: none;
    transition: opacity 0.2s;
}

.search-result:last-child {
    border-bottom: none;
}

.search-result:hover {
    opacity: 0.8;
}

.search-result-title {
    color: var(--c-primary);
    font-family: var(--font-display);
    font-weight: 700;
    margin-bottom: 0.5rem;
    font-size: 1.1rem;
}

.search-result-title mark {
    background: rgba(79,70,229,0.15);
    color: var(--c-primary);
}

.search-result-excerpt {
    color: var(--c-muted);
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    line-height: 1.5;
}

.search-result-excerpt mark {
    background: rgba(79,70,229,0.15);
    color: var(--c-primary);
}

.search-result-url {
    color: #999;
    font-size: 0.85rem;
}

.search-empty {
    color: var(--c-muted);
    padding: 2rem 0;
    text-align: center;
}

.search-tips {
    max-width: 720px;
    margin: 3rem auto 0;
    padding-top: 2rem;
    border-top: 1px solid var(--c-border);
}

.search-tips h3 {
    color: var(--c-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
}

.search-tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.75rem;
}

.search-tip-link {
    padding: 0.75rem 1rem;
    border: 1px solid var(--c-border);
    color: var(--c-muted);
    font-size: 0.875rem;
    display: block;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
}

.search-tip-link:hover {
    border-color: var(--c-primary);
    color: var(--c-primary);
}
</style>
