<style>
:root{--c-dark:#0D1117;--c-primary:#4F46E5;--c-white:#FFFFFF;--c-off-white:#F8F7FF;--c-body:#374151;--c-border:#E5E7EB;--font-display:'Newsreader',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif;--max-w:1200px;--article-w:900px;--edge:clamp(1.25rem,4vw,2.5rem);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}body{font-family:var(--font-body);font-size:0.9rem;line-height:1.65;color:var(--c-body);background:var(--c-white);-webkit-font-smoothing:antialiased;}
img{max-width:100%;display:block;height:auto;}
a{color:var(--c-primary);text-decoration:none;}a:hover{text-decoration:underline;}
h1,h2,h3{font-family:var(--font-display);}
.article-wrap{width:100%;max-width:var(--article-w);margin:0 auto;padding:0 var(--edge);}
header{background:#0D1117;color:var(--c-white);padding:2rem var(--edge);text-align:center;}
header h1{font-size:2.5rem;margin-bottom:0.5rem;color:var(--c-white);}
header p{font-size:1.1rem;color:rgba(255,255,255,0.85);max-width:800px;margin:0 auto;}
main{padding:3rem var(--edge);}
.search-box{max-width:600px;margin:2rem auto;padding:0;}
.search-box input{width:100%;padding:1rem;font-size:1rem;border:2px solid var(--c-border);border-radius:8px;font-family:var(--font-body);}
.search-box input:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px rgba(79,70,229,0.1);}
.category-filter{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin:2rem 0;}
.filter-btn{padding:0.5rem 1rem;border:2px solid var(--c-border);background:white;border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:0.9rem;transition:all 0.2s;color:var(--c-body);}
.filter-btn.active{background:var(--c-primary);color:white;border-color:var(--c-primary);}
.filter-btn:hover{border-color:var(--c-primary);color:var(--c-primary);}
#glossary-container{display:block;width:100%;max-width:var(--article-w);margin:0 auto;padding:0 var(--edge);}
.glossary-section{margin-bottom:3rem;}
.glossary-section-title{font-size:1.3rem;color:var(--c-dark);margin:2rem 0 1.5rem 0;padding-left:1rem;border-left:4px solid var(--c-primary);}
.glossary-term{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--c-border);}
.glossary-term:last-child{border-bottom:none;}
.term-title{font-size:1.1rem;font-weight:600;color:var(--c-dark);margin-bottom:0.5rem;font-family:var(--font-display);}
.term-definition{color:var(--c-body);margin-bottom:0.75rem;line-height:1.6;}
.term-links{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.75rem;}
.term-link{display:inline-block;padding:0.4rem 0.8rem;background:var(--c-off-white);border:1px solid var(--c-border);border-radius:6px;font-size:0.85rem;color:var(--c-primary);transition:all 0.2s;}
.term-link:hover{background:var(--c-primary);color:white;text-decoration:none;border-color:var(--c-primary);}
.no-results{text-align:center;padding:2rem;color:#999;font-style:italic;}
footer{background:#f0f0f0;padding:2rem var(--edge);text-align:center;font-size:0.9rem;color:#666;}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#4F46E5,#6366F1,#4F46E5);width:0%;z-index:999;box-shadow:0 2px 8px rgba(79,70,229,.18);}
@media (max-width:768px){header h1{font-size:1.8rem;}.term-links{flex-direction:column;}}
</style>

<script>
const glossaryData = [
  {"term": "90-Day Reporting", "definition": "A mandatory immigration requirement for certain long-term visa holders to report their residence location every 90 days. Can be done in person, by mail, or online via TM47 form.", "category": "processes", "links": [{"text": "90-Day Reporting", "url": "/immigration/90-day-reporting/"}]},
  {"term": "Amphur", "definition": "A district administrative division in Thailand, similar to a county. Used in address registration (TM30) and visa applications.", "category": "thailand-terms", "links": [{"text": "TM30 Registration", "url": "/immigration/tm30-registration/"}]},
  {"term": "Bank Balance Requirement", "definition": "The minimum amount of money required to be in your Thai bank account for visa approval. Varies by visa type (e.g., 800,000 THB for retirement, 500,000 THB for DTV).", "category": "documents", "links": [{"text": "Financial Requirements", "url": "/immigration/financial-requirements/"}]},
  {"term": "Blacklist", "definition": "Thailand's immigration blacklist prevents individuals from entering Thailand. Reasons include overstay, visa fraud, or criminal activity.", "category": "processes", "links": [{"text": "Blacklist Status Check", "url": "/immigration/blacklist-status/"}]},
  {"term": "Border Run", "definition": "Exiting Thailand and re-entering to reset your stay or visa. Common for visa-exempt entries and tourist visas. Returns with a fresh 30 or 60-day stamp.", "category": "processes", "links": [{"text": "Border Runs", "url": "/guides/border-runs/"}]},
  {"term": "Business Permit (Alien Workplace Permit)", "definition": "A work authorization required to legally work in Thailand. Separate from visa; both a work permit and appropriate visa (usually Non-B) are needed.", "category": "documents", "links": [{"text": "Work Permit vs DTV", "url": "/guides/dtv-vs-business-permit/"}]},
  {"term": "Business Visa (Non-B)", "definition": "Long-stay visa for business owners and employees. Requires company registration, endorsement letter, and financial documentation. Extendable annually.", "category": "visa-types", "links": [{"text": "Business Visa", "url": "/business-visa/"}]},
  {"term": "Digital Nomad Visa (DTV)", "definition": "Thailand's Destination Thailand Visa for remote workers, digital nomads, and people with passive income. Allows 180-day extensions, multi-entry, and indefinite renewals. Requires 500,000 THB in savings.", "category": "visa-types", "links": [{"text": "DTV Visa", "url": "/dtv-visa/"}, {"text": "DTV Deep Dive", "url": "/guides/dtv-deep-dive/"}]},
  {"term": "Education Visa (ED)", "definition": "Visa for studying in Thailand at schools, universities, or training programs. Covers Thai language, martial arts, volunteer work, and academic study. Indefinitely renewable with continued enrollment.", "category": "visa-types", "links": [{"text": "ED Visa", "url": "/ed-visa/"}]},
  {"term": "Extension of Stay", "definition": "Extending your visa validity beyond the initial grant period. Requires meeting financial and documentation requirements specific to each visa type.", "category": "processes", "links": [{"text": "Visa Extensions", "url": "/visa-extensions/"}, {"text": "DTV Extension", "url": "/guides/dtv-180-day-extension/"}]},
  {"term": "Financial Requirements", "definition": "The minimum income or bank balance needed for visa approval. Varies by visa: retirement (800,000 THB), DTV (500,000 THB), LTR (varies by category).", "category": "processes", "links": [{"text": "Financial Requirements", "url": "/immigration/financial-requirements/"}]},
  {"term": "Inland", "definition": "Applying for a visa extension or new visa within Thailand, typically at the immigration office. Contrasts with applying abroad.", "category": "processes", "links": [{"text": "Visa Extensions", "url": "/visa-extensions/"}]},
  {"term": "Long-Term Resident Visa (LTR)", "definition": "Thailand's premium long-stay visa (10-year validity) for remote workers, wealthy individuals, and retirees. Multiple categories based on income/savings.", "category": "visa-types", "links": [{"text": "LTR Visa", "url": "/ltr-visa/"}]},
  {"term": "Marriage Visa (Non-O)", "definition": "Long-stay visa for individuals married to Thai citizens. Requires marriage documentation, financial proof, and Thai spouse sponsorship.", "category": "visa-types", "links": [{"text": "Marriage Visa", "url": "/marriage-visa/"}]},
  {"term": "Muay Thai (ED)", "definition": "Popular ED visa program for training in traditional Thai boxing. Allows 1-year renewable visa with 4-6 training sessions per week required.", "category": "visa-types", "links": [{"text": "Muay Thai ED", "url": "/ed-visa/muay-thai/"}]},
  {"term": "Multi-Entry Permit", "definition": "Endorsement allowing a visa holder to exit and re-enter Thailand multiple times without invalidating their visa. Available on most long-stay visas.", "category": "documents", "links": [{"text": "Re-Entry Permits", "url": "/immigration/re-entry-permits/"}]},
  {"term": "Overstay", "definition": "Remaining in Thailand past your visa's expiration. Subject to fines (500 THB per day, max 20,000 THB), blacklisting, and deportation.", "category": "processes", "links": [{"text": "Overstay Penalties", "url": "/immigration/overstay-penalties/"}]},
  {"term": "Re-Entry Permit", "definition": "A stamp allowing you to exit Thailand and return without invalidating your visa. Must be obtained before leaving if staying long-term.", "category": "documents", "links": [{"text": "Re-Entry Permits", "url": "/immigration/re-entry-permits/"}]},
  {"term": "Retirement Visa (Non-O)", "definition": "Long-stay visa for retirees 50+ years old. Requires 800,000 THB in bank account or 65,000 THB monthly income. Indefinitely renewable.", "category": "visa-types", "links": [{"text": "Retirement Visa", "url": "/retirement-visa/"}]},
  {"term": "Seasoning", "definition": "The waiting period (typically 2-3 months) required to show a bank balance history before it's accepted as proof of funds. Important for DTV and retirement visas.", "category": "processes", "links": [{"text": "DTV Deep Dive", "url": "/guides/dtv-deep-dive/"}]},
  {"term": "Short-Stay Visa", "definition": "Tourist and visa-exempt entry categories allowing 30-60 day stays. Not extendable beyond initial grant except in specific circumstances.", "category": "visa-types", "links": [{"text": "Short-Stay Visas", "url": "/visas/short-stay/"}]},
  {"term": "Thailand Privilege Card", "definition": "Premium residency card for high-spending tourists and wealthy individuals. Offers perks like expedited visa services and special privileges.", "category": "visa-types", "links": [{"text": "Thailand Privilege", "url": "/thailand-privilege-visa/"}]},
  {"term": "TM.30 (Residence Notification)", "definition": "Official form notifying immigration of your residence address within 24 hours of arrival. Must be filed by landlord or accommodation provider.", "category": "documents", "links": [{"text": "TM30 Registration", "url": "/immigration/tm30-registration/"}]},
  {"term": "TM.47 (90-Day Report)", "definition": "Form for 90-day residence notification. Can be filed online, by mail, or in person at immigration office.", "category": "documents", "links": [{"text": "90-Day Reporting", "url": "/immigration/90-day-reporting/"}]},
  {"term": "Tourist Visa", "definition": "Visa for tourists visiting Thailand. Single-entry (60 days) or multiple-entry (6 months) options. Not extendable except in extreme circumstances.", "category": "visa-types", "links": [{"text": "Tourist Visa", "url": "/visas/short-stay/tourist-visa/"}]},
  {"term": "Visa-Exempt Entry", "definition": "Visa-free entry for certain nationalities, allowing 30-day stay. Not extendable except via border run or approval letter.", "category": "visa-types", "links": [{"text": "Visa-Exempt", "url": "/visas/short-stay/visa-exempt-entry/"}]},
  {"term": "Visa On Arrival (VOA)", "definition": "Visa issued upon arrival at Thai airport. Valid 15 days, can be extended 7 days. For tourists from non-exempt countries.", "category": "visa-types", "links": [{"text": "Visa On Arrival", "url": "/visas/short-stay/visa-on-arrival/"}]},
  {"term": "Visa Rejection", "definition": "Denial of visa application by immigration or embassy. Reasons include incomplete documentation, financial proof issues, or background concerns.", "category": "processes", "links": [{"text": "Why Visas Get Rejected", "url": "/guides/why-visas-get-rejected/"}]},
  {"term": "Volunteer Visa (Non-O)", "definition": "ED visa for volunteering in Thailand, common for humanitarian or charity work. Requires volunteer organization sponsorship.", "category": "visa-types", "links": [{"text": "Volunteer ED", "url": "/ed-visa/volunteer/"}]},
  {"term": "Work Permit", "definition": "Formal authorization from Thailand's Labor Ministry to work legally. Must be obtained in parallel with business visa. Usually valid 1 year.", "category": "documents", "links": [{"text": "Work Permit vs DTV", "url": "/guides/dtv-vs-business-permit/"}]}
];

function renderGlossary(terms = glossaryData, filter = 'all') {
  const container = document.getElementById('glossary-container');
  const noResults = document.getElementById('no-results');

  let filtered = terms;
  if (filter !== 'all') {
    filtered = terms.filter(t => t.category === filter);
  }

  if (filtered.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  const grouped = {};
  filtered.forEach(t => {
    const letter = t.term.charAt(0).toUpperCase();
    if (!grouped[letter]) grouped[letter] = [];
    grouped[letter].push(t);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(letter => {
    html += `<div class="glossary-section"><h3 class="glossary-section-title">${letter}</h3>`;
    grouped[letter].forEach(t => {
      html += `<div class="glossary-term">
        <div class="term-title">${t.term}</div>
        <div class="term-definition">${t.definition}</div>`;
      if (t.links && t.links.length > 0) {
        html += `<div class="term-links">`;
        t.links.forEach(l => {
          html += `<a href="${l.url}" class="term-link">${l.text}</a>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;
}

document.getElementById('glossary-search').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const activeFilter = document.querySelector('.filter-btn.active').dataset.category;

  if (!query) {
    renderGlossary(glossaryData, activeFilter);
    return;
  }

  const filtered = glossaryData.filter(t =>
    t.term.toLowerCase().includes(query) ||
    t.definition.toLowerCase().includes(query)
  );

  if (activeFilter !== 'all') {
    const categoryFiltered = filtered.filter(t => t.category === activeFilter);
    renderGlossary(categoryFiltered, activeFilter);
  } else {
    renderGlossary(filtered, 'all');
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const category = btn.dataset.category;
    document.getElementById('glossary-search').value = '';
    renderGlossary(glossaryData, category);
  });
});

renderGlossary();

window.addEventListener('scroll', () => {
  const winScroll = document.documentElement.scrollTop || document.body.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (winScroll / height) * 100;
  document.getElementById('progress-bar').style.width = scrolled + '%';
});
</script>
</body>
